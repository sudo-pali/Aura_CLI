name: Pipeline
on: [push]

jobs:
  aura-test:
    runs-on: ubuntu-latest
    steps:
    - name: Baixar o código
      uses: actions/checkout@v4

    - name: Instalar o python
      uses: actions/setup-python@v6
      with:
        python-version: '3.12.8'

    - name: Instalar poetry e rodar testes
      run: |
      pip install poetry
      poetry install
      poetry run pytest


